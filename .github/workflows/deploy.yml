name: Deploy

on:
  push:
    branches: [main]
    paths:
      - "main.py"
      - "db.py"
      - "utils.py"
      - ".github/workflows/deploy.yml"

permissions:
  contents: read
  id-token: write

jobs:
  deploy-staging:
    name: Deploy to staging
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - uses: google-github-actions/setup-gcloud@v2

      - uses: astral-sh/setup-uv@v5

      - name: Deploy
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          DISCORD_USER: ${{ secrets.DISCORD_USER }}
          DEFAULT_URL: ${{ secrets.DEFAULT_URL }}
          DATABASE_NAME: ${{ secrets.DATABASE_NAME }}
          COLLECTION_NAME: ${{ secrets.COLLECTION_NAME }}
          TEST_TOKEN: ${{ secrets.TEST_TOKEN }}
          FUNCTION_URL: ${{ secrets.FUNCTION_URL }}
        run: |
          uv export --no-hashes -o requirements.txt
          gcloud functions deploy link-tracker-staging \
            --gen2 \
            --runtime=python314 \
            --entry-point=main \
            --source=. \
            --region=us-central1 \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --set-env-vars="DISCORD_WEBHOOK=${DISCORD_WEBHOOK},DISCORD_USER=${DISCORD_USER},DEFAULT_URL=${DEFAULT_URL},DATABASE_NAME=${DATABASE_NAME},COLLECTION_NAME=${COLLECTION_NAME},TEST_TOKEN=${TEST_TOKEN},FUNCTION_URL=${FUNCTION_URL}"

      - name: E2E Test
        env:
          FUNCTION_URL: ${{ secrets.FUNCTION_URL }}
          TEST_TOKEN: ${{ secrets.TEST_TOKEN }}
          DEFAULT_URL: ${{ secrets.DEFAULT_URL }}
        run: uv run pytest tests/ --env=staging

  deploy-prod:
    name: Deploy to prod
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - uses: google-github-actions/setup-gcloud@v2

      - uses: astral-sh/setup-uv@v5

      - name: Deploy
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          DISCORD_USER: ${{ secrets.DISCORD_USER }}
          DEFAULT_URL: ${{ secrets.DEFAULT_URL }}
          DATABASE_NAME: ${{ secrets.DATABASE_NAME }}
          COLLECTION_NAME: ${{ secrets.COLLECTION_NAME }}
          TEST_TOKEN: ${{ secrets.TEST_TOKEN }}
          FUNCTION_URL: ${{ secrets.FUNCTION_URL }}
        run: |
          uv export --no-hashes -o requirements.txt
          gcloud functions deploy link-tracker \
            --gen2 \
            --runtime=python314 \
            --entry-point=main \
            --source=. \
            --region=us-central1 \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --set-env-vars="DISCORD_WEBHOOK=${DISCORD_WEBHOOK},DISCORD_USER=${DISCORD_USER},DEFAULT_URL=${DEFAULT_URL},DATABASE_NAME=${DATABASE_NAME},COLLECTION_NAME=${COLLECTION_NAME},TEST_TOKEN=${TEST_TOKEN},FUNCTION_URL=${FUNCTION_URL}"

      - name: E2E Test
        env:
          FUNCTION_URL: ${{ secrets.FUNCTION_URL }}
          TEST_TOKEN: ${{ secrets.TEST_TOKEN }}
          DEFAULT_URL: ${{ secrets.DEFAULT_URL }}
        run: uv run pytest tests/ --env=prod
